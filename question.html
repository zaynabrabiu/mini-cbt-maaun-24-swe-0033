<!DOCTYPE html>
<html>
<head>
    <title>Mini CBT - Current Question</title>
</head>
<body style="font-family: Arial; padding: 50px;">
    <h1>Question</h1>
    <p><strong>❓ {{ question.text }}</strong></p>
    
    <form action="/submit" method="post">
        {% for key, text in question.choices.items() %}
            <input type="radio" name="answer" value="{{ key }}" required>
            <label style="font-size: 18px;">{{ key }}: {{ text }}</label><br><br>
        {% endfor %}
        <button type="submit" style="padding: 12px 25px;">Submit Answer</button>
    </form>
</body>
</html>
